<!-- content fragment: exactly one ng-content -->
<ng-template #content>
  <span class="btn-spinner" aria-hidden="true"></span>
  <span class="btn-content"><ng-content /></span>
</ng-template>

@if (href()) {
  <a
    class="btn"
    [attr.data-variant]="variant()"
    [attr.data-size]="size()"
    [attr.data-fullwidth]="fullWidth()"
    [attr.aria-disabled]="isDisabled()"
    [attr.data-loading]="loading()"
    [href]="href()"
    [target]="target()"
    [attr.rel]="computedRel()"
  >
    <ng-container [ngTemplateOutlet]="content"></ng-container>
  </a>
} @else {
  <button
    class="btn"
    [attr.data-variant]="variant()"
    [attr.data-size]="size()"
    [attr.data-fullwidth]="fullWidth()"
    [attr.data-loading]="loading()"
    [disabled]="isDisabled()"
    type="button"
  >
    <ng-container [ngTemplateOutlet]="content"></ng-container>
  </button>
}
